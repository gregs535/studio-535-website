<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Studio 535</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070b] text-gray-200 min-h-screen font-sans">
  <nav class="flex justify-between items-center px-8 py-6 border-b border-gray-800">
    <a href="/" class="text-2xl font-bold bg-gradient-to-r from-yellow-400 to-cyan-400 bg-clip-text text-transparent">STUDIO 535</a>
    <a href="/" class="hover:text-yellow-400 transition">Home</a>
  </nav>

  <main class="px-8 py-20 max-w-2xl mx-auto">
    <h1 class="text-4xl font-bold mb-4">Get In Touch</h1>
    <p class="text-gray-400 mb-12">Laser work inquiries, infrastructure consulting, or partnership questions</p>

    <form class="space-y-6" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div>
        <label class="block mb-2">Name</label>
        <input type="text" name="name" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg" required />
      </div>
      
      <div>
        <label class="block mb-2">Email</label>
        <input type="email" name="email" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg" required />
      </div>
      
      <div>
        <label class="block mb-2">Service Needed</label>
        <select name="service" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg">
          <option>Laser Engraving</option>
          <option>3D Printing</option>
          <option>Home Infrastructure</option>
          <option>Business Infrastructure</option>
          <option>Marine Infrastructure</option>
          <option>Aviation Infrastructure</option>
          <option>Other Inquiry</option>
        </select>
      </div>
      
      <div>
        <label class="block mb-2">Details</label>
        <textarea name="message" rows="5" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg" required></textarea>
      </div>
      
      <button type="submit" class="w-full py-3 bg-yellow-400 text-black font-bold rounded-full">Send Message</button>
    </form>
    <p class="text-xs text-gray-500 mt-4">* Connects to Formspree - create account at formspree.io for form handling</p>
  </main>
</body>
</html>
