<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop - Studio 535</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070b] text-gray-200 min-h-screen font-sans">
  <nav class="flex justify-between items-center px-8 py-6 border-b border-gray-800">
    <a href="/" class="text-2xl font-bold bg-gradient-to-r from-yellow-400 to-cyan-400 bg-clip-text text-transparent">STUDIO 535</a>
    <a href="/contact" class="hover:text-yellow-400 transition">Contact</a>
  </nav>

  <main class="px-8 py-20 max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold mb-12">Digital Products</h1>
    
    <div class="grid md:grid-cols-3 gap-8">
      <!-- Product 1 -->
      <div class="glass rounded-xl p-6 text-center">
        <div class="h-48 bg-gradient-to-br from-yellow-400/20 to-transparent rounded-lg mb-4 flex items-center justify-center">
          <span class="text-6xl">📄</span>
        </div>
        <h3 class="font-bold text-lg mb-2">Sales Copy Starter Kit</h3>
        <p class="text-gray-400 text-sm mb-4">Templates for landing pages, emails, proposals</p>
        <p class="text-2xl font-bold text-yellow-400">$15</p>
        <button class="mt-4 px-4 py-2 bg-yellow-400 text-black rounded-full">Buy on Etsy</button>
      </div>

      <!-- Product 2 -->
      <div class="glass rounded-xl p-6 text-center">
        <div class="h-48 bg-gradient-to-br from-cyan-400/20 to-transparent rounded-lg mb-4 flex items-center justify-center">
          <span class="text-6xl">🐕</span>
        </div>
        <h3 class="font-bold text-lg mb-2">Pet Tag Templates</h3>
        <p class="text-gray-400 text-sm mb-4">SVG laser files for 20 designs</p>
        <p class="text-2xl font-bold text-cyan-400">$12</p>
        <button class="mt-4 px-4 py-2 glass border border-white/10 rounded-full">Coming Soon</button>
      </div>

      <!-- Product 3 -->
      <div class="glass rounded-xl p-6 text-center">
        <div class="h-48 bg-gradient-to-br from-purple-400/20 to-transparent rounded-lg mb-4 flex items-center justify-center">
          <span class="text-6xl">🧒</span>
        </div>
        <h3 class="font-bold text-lg mb-2">Children's Ebook</h3>
        <p class="text-gray-400 text-sm mb-4">Robot learns to garden - illustrated</p>
        <p class="text-2xl font-bold text-purple-400">$8</p>
        <button class="mt-4 px-4 py-2 glass border border-white/10 rounded-full">Coming Soon</button>
      </div>
    </div>
  </main>
</body>
</html>
